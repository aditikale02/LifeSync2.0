name: LifeSync CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lifesync-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Frontend build
        run: npm run build

      - name: Server build
        run: npm run build:server

      - name: Preflight (non-strict)
        run: npm run preflight

  strict-deployment-gate:
    runs-on: ubuntu-latest
    needs: [quality-and-build]
    if: ${{ secrets.VITE_SUPABASE_URL != '' && (secrets.VITE_SUPABASE_ANON_KEY != '' || secrets.VITE_SUPABASE_PUBLISHABLE_KEY != '') }}
    env:
      PREFLIGHT_STRICT: true
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight (strict)
        run: npm run preflight:strict
